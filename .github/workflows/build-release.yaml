name: Build and Release

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build chainlit wheel and publish to GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 'lts/*'
          cache: 'pnpm'
          cache-dependency-path: '**/pnpm-lock.yaml'

      - name: Install JS dependencies
        run: pnpm install

      - name: Build frontend and copilot
        run: pnpm build

      - name: Copy frontend assets to backend
        run: |
          mkdir -p backend/chainlit/frontend/dist
          cp -r frontend/dist/* backend/chainlit/frontend/dist/

      - name: Copy copilot assets to backend
        run: |
          mkdir -p backend/chainlit/copilot/dist
          cp -r libs/copilot/dist/* backend/chainlit/copilot/dist/

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: uv sync --group dev
        working-directory: ./backend

      - name: Build Python distribution
        run: uv build --no-build-isolation
        working-directory: ./backend

      - name: Get version and wheel filename
        id: meta
        run: |
          VERSION=$(uv run python -c "from chainlit.version import __version__; print(__version__)")
          WHEEL=$(find dist/ -maxdepth 1 -name '*.whl' | head -1)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "wheel=${WHEEL}" >> "$GITHUB_OUTPUT"
        working-directory: ./backend

      - name: Delete existing 'latest' tag and release
        continue-on-error: true
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create GitHub Release with wheel
        run: |
          gh release create latest backend/dist/* \
            --title "chainlit v${{ steps.meta.outputs.version }} (latest build)" \
            --notes "Automated build from commit ${{ github.sha }} on branch ${{ github.ref_name }}.

          ## Install

          \`\`\`bash
          pip install https://github.com/${{ github.repository }}/releases/latest/download/$(basename '${{ steps.meta.outputs.wheel }}')
          \`\`\`

          Or install directly from git:

          \`\`\`bash
          pip install git+https://github.com/${{ github.repository }}.git@main
          \`\`\`"
        env:
          GH_TOKEN: ${{ github.token }}
